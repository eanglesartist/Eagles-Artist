name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile all modules
        run: python -m py_compile app.py state.py $(find pages components ai_engine api database -name "*.py")

      - name: Smoke-test prompt engine
        run: |
          python -c "
          from ai_engine.prompt_builder import expand_prompt
          assert expand_prompt('attack goat')
          print('prompt engine OK')
          "
